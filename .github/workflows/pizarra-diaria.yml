name: Precio Pizarra Diario

on:
  schedule:
    # 12:00 UTC = 09:00 Argentina
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar notificacion diaria
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --max-time 120 \
            https://morettis-gastos.onrender.com/api/push-test
