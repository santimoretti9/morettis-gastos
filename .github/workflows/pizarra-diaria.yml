name: Precio Pizarra Diario

on:
  schedule:
    # Reintentos durante el dia: el servidor envia solo una vez despues de las 09:00 Argentina.
    - cron: '*/15 9-16 * * *'
  workflow_dispatch:

jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar notificacion diaria
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --max-time 120 \
            https://morettis-gastos.onrender.com/api/push-diario
